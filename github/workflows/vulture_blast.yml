name: Vulture 10K Blast
on:
  schedule:
    - cron: '0 0 * * *' # Daily automated blast
  workflow_dispatch:    # This IS the "Run Button" trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Crucial for the 'push' step to work
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Execute Vulture Generator
        run: python vulture_generator.py
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name "brightlane"
          git config --global user.email "your-email@example.com"
          git add .
          git commit -m "Vulture Blast: $(date +'%Y-%m-%d')" || exit 0
          git push
