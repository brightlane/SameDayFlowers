name: Same Day Flowers Daily Engine

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  build-and-broadcast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Vulture Page Generator
        run: python vulture_generator.py

      - name: Run Vulture Bing Blast
        # Adding a quick check here to verify 'requests' is ready
        run: |
          python -c "import requests; print('Requests library is ready')"
          python sdf_bing_blast.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Vulture Engine Update [$(date +'%Y-%m-%d')]" || echo "No changes"
          git push
