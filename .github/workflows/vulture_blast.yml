name: Vulture 10K Daily Engine

on:
  schedule:
    - cron: '0 5 * * *' # Automated daily run
  workflow_dispatch: # Manual "Go Go Go" button

permissions:
  contents: write

jobs:
  execute-vulture-protocol:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # This line makes it function across all repos:
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Force install requests just in case requirements.txt is missing
          pip install requests 

      - name: Run Vulture Core
        run: |
          # Use 'python' for environment consistency
          if [ -f vulture_generator.py ]; then python vulture_generator.py; fi
          if [ -f sdf_bing_blast.py ]; then python sdf_bing_blast.py; fi
          # If other repos use different script names, add them here:
          if [ -f blast_to_bing.py ]; then python blast_to_bing.py; fi

      - name: Sync and Push
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "actions@github.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Vulture Engine Sync: $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes detected."
          fi
