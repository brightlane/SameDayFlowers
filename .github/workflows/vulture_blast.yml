name: Same Day Flowers Daily Engine

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-broadcast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install and Execute
        run: |
          # Use 'python -m' to ensure we target the Action's Python instance
          python -m pip install --upgrade pip
          python -m pip install requests
          
          # Run the generator
          python vulture_generator.py
          
          # Run the blast (Note: we use 'python', NOT 'python3')
          python sdf_bing_blast.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "actions@github.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Vulture Engine Update [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "No changes to commit"
          fi
