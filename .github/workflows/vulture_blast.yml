name: Same Day Flowers Daily Engine

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-broadcast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Force Install and Run
        run: |
          # Use the full path to the python binary provided by the action
          python -m pip install --upgrade pip
          python -m pip install requests
          
          # Verify installation in the logs so we can see it
          python -c "import requests; print('✅ Requests is officially installed')"
          
          # Run the generator
          python vulture_generator.py
          
          # Run the blast
          python sdf_bing_blast.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "actions@github.com"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Vulture Engine: Daily Update [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "No changes to commit"
          fi
