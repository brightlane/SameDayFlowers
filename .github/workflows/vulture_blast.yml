name: Same Day Flowers Daily Engine

on:
  schedule:
    # Triggers daily at 05:00 UTC (12:00 AM EST)
    - cron: '0 5 * * *'
  workflow_dispatch:
    # Manual "Go Go Go" trigger button in GitHub Actions tab
    inputs:
      reason:
        description: 'Reason for manual blast'
        required: false
        default: 'Manual Vulture Sync'

permissions:
  contents: write

jobs:
  build-and-broadcast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up daily runs

      - name: Execute Vulture Protocol
        run: |
          # 1. Environment Preparation
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests # Hard-coded fail-safe for the blast script

          # 2. Sequential Execution (Only runs files if they exist in the repo)
          echo "🚀 Starting Vulture Sequence..."
          
          if [ -f vulture_generator.py ]; then 
            echo "Running Page Generator..."
            python vulture_generator.py
          fi
          
          if [ -f generate_llms_txt.py ]; then 
            echo "Generating AI Context (llms.txt)..."
            python generate_llms_txt.py
          fi
          
          if [ -f sdf_bing_blast.py ]; then 
            echo "Broadcasting to IndexNow (Cities 2001-4000)..."
            python sdf_bing_blast.py
          fi

      - name: Sync and Commit Changes
        run: |
          git config --global user.name "Vulture-Bot"
          git config --global user.email "actions@github.com"
          
          # Add all generated assets
          git add blog/ sitemap.xml llms.txt robots.txt index.html blog.html affiliate.json
          
          # Only commit if there are actual changes to prevent Action errors
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Vulture Engine Sync: $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes detected. Skipping commit."
          fi
