name: Same Day Flowers Daily Engine
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Git config
        run: |
          git config user.name "FlowerEngineBot"
          git config user.email "bot@brightlane.dev"

      - name: Pull latest
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Generate daily blog post
        run: python3 daily-generator.py

      - name: Run multilingual Bing blast
        run: python3 sdf_bing_blast.py

      - name: Commit and push
        run: |
          git add .
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Daily Engine Update [$(date +'%Y-%m-%d')]"
          git fetch origin main
          if git rebase -X theirs origin/main; then
            git push origin main && exit 0
          fi
          git rebase --abort || true
          git reset --hard origin/main
          git add .
          git diff --staged --quiet && exit 0
          git commit -m "Daily Engine Update (retry) [$(date +'%Y-%m-%d')]"
          git push origin main

      - name: Social webhook (optional)
        run: |
          if [ -n "${{ secrets.SOCIAL_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.SOCIAL_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"title":"Same Day Flowers — Free Delivery Today","link":"https://brightlane.github.io/SameDayFlowers/","affiliate_link":"https://www.floristone.com/main.cfm?occ=md&source_id=aff&AffiliateID=21885"}' \
            && echo "Webhook sent" || echo "Webhook failed — no action needed"
          else
            echo "No webhook configured, skipping"
          fi
