name: Build and Deploy Pages

on:
  push:
    branches:
      - main

  # ✅ THIS ADDS THE "RUN WORKFLOW" BUTTON
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate pages
        run: python vulture_generator_master.py

      - name: Commit generated pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add blog
          git commit -m "auto-generate pages" || echo "No changes"
          git push
