name: Build and Deploy Pages

on:
  push:
    branches:
      - main

  workflow_dispatch:   # ✅ RUN BUTTON

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug files
        run: ls -R

      - name: Generate pages
        run: python vulture_generator_master.py

      - name: Verify output exists
        run: |
          echo "BLOG FILES:"
          ls blog || echo "NO BLOG FOLDER"
          echo "SITEMAP:"
          ls sitemaps || echo "NO SITEMAP"

      # 🔥 CRITICAL STEP (THIS WAS MISSING)
      - name: Commit generated pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add blog sitemaps

          git commit -m "auto deploy pages" || echo "No changes"

          git push
