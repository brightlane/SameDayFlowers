name: Build and Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ FIX: install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt || pip install requests

      # Optional debug (helps if things break again)
      - name: Debug files
        run: ls -R

      # Step 1: Generate pages
      - name: Generate pages
        run: python vulture_generator_master.py

      # Step 2: Build sitemaps
      - name: Build sitemaps
        run: python vulture_sitemap_factory.py

      # Step 3: Submit to IndexNow (FIXED)
      - name: IndexNow submission
        run: python bing_indexnow_blast.py

      # Optional redundancy
      - name: Secondary Index submission
        run: python sdf_bing_blast.py

      # Step 4: Verify output exists
      - name: Verify output
        run: |
          echo "BLOG FILES:"
          ls blog || echo "NO BLOG FOLDER"
          echo "SITEMAPS:"
          ls sitemaps || echo "NO SITEMAP FOLDER"

      # Step 5: Commit + Push
      - name: Commit generated pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "auto deploy pages" || echo "Nothing to commit"

          git pull --rebase origin main
          git push
