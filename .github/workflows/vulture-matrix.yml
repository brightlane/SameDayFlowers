name: Vulture 10K Daily Engine

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-vulture-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements
        run: |
          pip install --upgrade pip
          pip install requests

      # Step 1: Build the 10k Pages
      - name: Build Pages
        run: python vulture_generator_master.py

      # Step 2: Build the Sitemap Index
      - name: Build Sitemaps
        run: python vulture_sitemap_factory.py

      # Step 3: Submit to IndexNow (FIXED)
      - name: IndexNow Blast
        run: python bing_indexnow_blast.py

      # Optional redundancy (recommended)
      - name: Secondary Index Blast
        run: python sdf_bing_blast.py

      # Step 4: Verify output (debug safety)
      - name: Verify Output
        run: |
          echo "BLOG:"
          ls -R blog || echo "No blog folder"
          echo "SITEMAPS:"
          ls -R sitemaps || echo "No sitemap folder"

      # Step 5: Commit + Push safely
      - name: Push Changes
        run: |
          git config --local user.email "bot@vulture.internal"
          git config --local user.name "Vulture-Bot"

          git add .

          git commit -m "Vulture Sync: $(date +'%Y-%m-%d') [10K Protocol]" || echo "No changes to commit"

          git pull --rebase origin main
          git push origin main
