name: Vulture 10K Daily Engine

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-vulture-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install requests

      # Step 1: Build the 10k Pages
      - name: Build Pages
        run: python vulture_generator_master.py

      # Step 2: Build the Trillion-Scale Sitemap Index
      - name: Build Sitemaps
        run: python vulture_sitemap_factory.py

      # Step 3: Blast Search Engines
      - name: IndexNow Blast
        run: python vulture_index_blast.py

      # Step 4: Sync back to GitHub
      - name: Push Changes
        run: |
          git config --local user.email "bot@vulture.internal"
          git config --local user.name "Vulture-Bot"
          git add .
          git commit -m "Vulture Sync: $(date +'%Y-%m-%d') [10K Protocol]" || exit 0
          git pull --rebase origin main
          git push origin main
