name: Vulture 10K Daily Engine

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows you to trigger it manually from the "Actions" tab

permissions:
  contents: write

jobs:
  run-vulture-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for rebase to work

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Vulture Master Generator
        run: python vulture_generator_master.py

      - name: Execute Bing IndexNow Blast
        run: python sdf_bing_blast.py
        env:
          BING_API_KEY: ${{ secrets.BING_API_KEY }}

      - name: Sync and Push with Conflict Resolution
        run: |
          git config --local user.email "bot@vulture.internal"
          git config --local user.name "Vulture-Bot"
          
          # Stage all generated pages and llms.txt
          git add .
          
          # Commit only if there are changes; '|| true' prevents failure on no-op
          git commit -m "Vulture Engine Sync: $(date +'%Y-%m-%d %H:%M:%S') [Bot]" || echo "No changes to commit"
          
          # THE FIX: Pull latest changes and rebase our 10k pages on top
          git pull --rebase origin main
          
          # Final Push
          git push origin main
