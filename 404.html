<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | SameDayFlowers</title>

    <!-- Auto-redirect to home after 10 seconds if they don't click anything -->

    <style>
        :root { --primary: #ff4757; --bg: #0a0b10; --card: #11141d; --text: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center; 
            padding: 20px; 
        }
        .container { background: var(--card); padding: 50px 30px; border-radius: 20px; border: 1px solid #1a1c23; max-width: 500px; }
        .emoji { font-size: 4rem; margin-bottom: 16px; }
        h1 { font-size: 2.2rem; font-weight: 800; color: #fff; margin-bottom: 12px; }
        p { font-size: 1.1rem; color: #a4b0be; margin-bottom: 30px; line-height: 1.5; }
        .btn { 
            display: inline-block; 
            background: var(--primary); 
            color: #fff; 
            padding: 16px 35px; 
            border-radius: 99px; 
            font-weight: 700; 
            font-size: 1.1rem; 
            text-decoration: none; 
            margin: 10px; 
            transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.2);
        }
        .btn:hover { transform: translateY(-3px); }
        .btn.outline { 
            background: transparent; 
            color: var(--text); 
            border: 2px solid #1a1c23; 
            box-shadow: none;
        }
    </style>
</head>

    </div>
