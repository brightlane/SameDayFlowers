<script>
const cities = [
  "New York, NY",
  "Los Angeles, CA",

  "Phoenix, AZ",

  "San Antonio, TX",

const list = document.getElementById("dispatch-list");

cities.forEach(city => {
  const slug = city.toLowerCase().replace(/,/g,'').replace(/ /g,'-');

  const li = document.createElement("li");

  li.innerHTML = `

  list.appendChild(li);
